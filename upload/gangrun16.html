<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lottong Pinoy - 20-Up Gang Run Optimizer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .plate-card { border: 2px solid #e2e8f0; border-radius: 1rem; overflow: hidden; background: white; }
        .island-label { font-size: 10px; font-weight: 900; fill: #1e293b; }
        .gripper-bar { fill: #f0fdf4; stroke: #16a34a; stroke-dasharray: 2; }
        .die-line { stroke: #ef4444; stroke-width: 1; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen font-sans text-slate-900">
    <div class="max-w-6xl mx-auto p-6">
        <header class="mb-8 flex justify-between items-end">
            <div>
                <h1 class="text-4xl font-black tracking-tighter uppercase">Production <span class="text-blue-600">v25</span></h1>
                <p class="text-slate-500 font-bold text-xs tracking-widest uppercase">20-Up Layout ($5 \times 4$) | Dual-Plate Solver</p>
            </div>
            <button onclick="calculateProduction()" class="bg-blue-600 text-white px-8 py-3 rounded-xl font-black hover:bg-blue-700 transition-all shadow-lg shadow-blue-200 uppercase tracking-wider">Calculate Run</button>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
            <div class="lg:col-span-1 space-y-4">
                <div class="bg-white p-6 rounded-2xl border-2 border-slate-200 shadow-sm">
                    <h3 class="font-black text-sm uppercase mb-4 text-slate-400">Order Quantities</h3>
                    <div id="inputGroup" class="space-y-3">
                        </div>
                </div>
            </div>

            <div class="lg:col-span-3 space-y-8">
                <div id="platesContainer" class="space-y-10">
                    <div class="text-center py-20 bg-white rounded-2xl border-2 border-dashed border-slate-200 text-slate-400">
                        <p class="font-bold">Click "Calculate Run" to generate the 20-up production plan.</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const initialOrders = [
            { id: 'G', qty: 6844, color: '#fca5a5' },
            { id: 'F', qty: 2860, color: '#fde047' },
            { id: 'E', qty: 2750, color: '#fbbf24' },
            { id: 'D', qty: 2255, color: '#86efac' },
            { id: 'C', qty: 1674, color: '#67e8f9' },
            { id: 'B', qty: 924, color: '#a5b4fc' },
            { id: 'A', qty: 825, color: '#d8b4fe' }
        ];

        function renderInputs() {
            const container = document.getElementById('inputGroup');
            container.innerHTML = initialOrders.map((o, i) => `
                <div class="flex items-center gap-3">
                    <span class="w-6 font-black text-xs text-slate-400">${o.id}</span>
                    <input type="number" id="qty-${o.id}" value="${o.qty}" class="w-full bg-slate-50 border-2 border-slate-100 rounded-lg px-3 py-2 font-black text-sm focus:border-blue-400 outline-none">
                </div>
            `).join('');
        }

        function calculateProduction() {
            const currentOrders = initialOrders.map(o => ({
                ...o,
                qty: parseInt(document.getElementById(`qty-${o.id}`).value)
            }));

            // Step 1: Anchor to Project G (8 Outs) to find Run 2 Length
            const gOrder = currentOrders.find(o => o.id === 'G');
            const run2 = Math.ceil(gOrder.qty / 8); // 856
            
            // Step 2: Set Run 1 to 231 (The Small-Batch Optimum)
            const run1 = 231;

            const plates = [
                {
                    id: 1, run: run1, title: "Small-Batch Cleanup",
                    items: [
                        { id: 'A', outs: 4, target: currentOrders.find(o => o.id === 'A').qty },
                        { id: 'B', outs: 4, target: currentOrders.find(o => o.id === 'B').qty },
                        { id: 'C', outs: 7, target: currentOrders.find(o => o.id === 'C').qty },
                        { id: 'D', outs: 5, target: 0 } // Carry over
                    ],
                    grid: [
                        { id: 'A', c: 0, r: 0, w: 4, h: 1 }, { id: 'B', c: 0, r: 1, w: 4, h: 1 },
                        { id: 'C', c: 0, r: 2, w: 4, h: 1 }, { id: 'C', c: 4, r: 0, w: 1, h: 3 },
                        { id: 'D', c: 0, r: 3, w: 5, h: 1 }
                    ]
                },
                {
                    id: 2, run: run2, title: "High-Volume Lead",
                    items: [
                        { id: 'G', outs: 8, target: currentOrders.find(o => o.id === 'G').qty },
                        { id: 'F', outs: 3, target: currentOrders.find(o => o.id === 'F').qty },
                        { id: 'E', outs: 3, target: currentOrders.find(o => o.id === 'E').qty },
                        { id: 'D', outs: 3, target: currentOrders.find(o => o.id === 'D').qty },
                        { id: 'C', outs: 3, target: 57 } // Remainder from Run 1
                    ],
                    grid: [
                        { id: 'G', c: 0, r: 0, w: 4, h: 2 }, { id: 'F', c: 4, r: 0, w: 1, h: 3 },
                        { id: 'E', c: 0, r: 2, w: 3, h: 1 }, { id: 'D', c: 3, r: 2, w: 2, h: 1 },
                        { id: 'C', c: 0, r: 3, w: 3, h: 1 }, { id: 'D', c: 3, r: 3, w: 1, h: 1 }
                    ]
                }
            ];

            renderResults(plates);
        }

        function renderResults(plates) {
            const container = document.getElementById('platesContainer');
            container.innerHTML = plates.map(p => `
                <div class="plate-card shadow-xl shadow-slate-200 border-none">
                    <div class="bg-slate-900 p-6 flex justify-between items-center text-white">
                        <div>
                            <h2 class="font-black italic uppercase tracking-tighter">Plate #${p.id}: ${p.title}</h2>
                            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mt-1">Grid: 5x4 (20-Up) | Layout: 24" x 18"</p>
                        </div>
                        <div class="text-right">
                            <span class="text-[10px] font-black uppercase text-blue-400 block mb-1">Impression Count</span>
                            <span class="text-3xl font-black tabular-nums">${p.run.toLocaleString()}</span>
                        </div>
                    </div>
                    <div class="p-8 grid grid-cols-1 xl:grid-cols-2 gap-12 items-start">
                        <div class="bg-slate-100 rounded-2xl p-6 border-2 border-slate-200">
                            ${renderSVG(p)}
                        </div>
                        <div class="overflow-x-auto">
                            <table class="w-full text-left">
                                <thead>
                                    <tr class="text-[10px] font-black text-slate-400 uppercase border-b-2 border-slate-100">
                                        <th class="pb-3">Project</th>
                                        <th class="pb-3 text-center">Outs</th>
                                        <th class="pb-3 text-right">Yield</th>
                                        <th class="pb-3 text-right">Balance</th>
                                    </tr>
                                </thead>
                                <tbody class="divide-y divide-slate-50">
                                    ${p.items.map(it => {
                                        const yieldVal = it.outs * p.run;
                                        const bal = yieldVal - it.target;
                                        const color = initialOrders.find(o => o.id.charAt(0) === it.id.charAt(0)).color;
                                        return `
                                            <tr class="text-sm font-bold">
                                                <td class="py-4 flex items-center gap-3">
                                                    <span class="w-3 h-3 rounded-full" style="background:${color}"></span>
                                                    Project ${it.id}
                                                </td>
                                                <td class="py-4 text-center font-mono">${it.outs}</td>
                                                <td class="py-4 text-right font-mono">${yieldVal.toLocaleString()}</td>
                                                <td class="py-4 text-right font-mono ${bal < 0 ? 'text-red-500' : 'text-blue-600'}">
                                                    ${bal >= 0 ? '+' : ''}${bal.toLocaleString()}
                                                </td>
                                            </tr>
                                        `;
                                    }).join('')}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function renderSVG(p) {
            const uw = 65, uh = 55; // 5x4 Grid Scaling
            let svg = `<svg viewBox="0 0 350 250" class="w-full h-auto drop-shadow-lg">`;
            svg += `<rect x="5" y="5" width="340" height="240" fill="white" stroke="#cbd5e1" stroke-width="1"/>`;
            svg += `<rect x="5" y="5" width="340" height="25" class="gripper-bar" fill-opacity="0.5"/>`;

            p.grid.forEach(is => {
                const x = 10 + (is.c * uw);
                const y = 35 + (is.r * uh);
                const w = is.w * uw;
                const h = is.h * uh;
                const color = initialOrders.find(o => o.id.charAt(0) === is.id.charAt(0)).color;

                svg += `
                    <g>
                        <rect x="${x}" y="${y}" width="${w}" height="${h}" fill="${color}" fill-opacity="0.4" class="die-line"/>
                        <text x="${x + w/2}" y="${y + h/2}" text-anchor="middle" alignment-baseline="middle" class="island-label">${is.id}</text>
                    </g>
                `;
            });
            return svg + `</svg>`;
        }

        renderInputs();
    </script>
</body>
</html>
