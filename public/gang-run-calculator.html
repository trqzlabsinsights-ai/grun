<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gang Run Calculator</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #020617; --card: #0f172a; --card-border: #1e293b; --card-hover: #1e293b;
    --accent: #06b6d4; --accent2: #f59e0b; --text: #e2e8f0; --text-muted: #94a3b8; --text-dim: #64748b;
    --success: #10b981; --danger: #ef4444; --pink: #ec4899;
  }
  html { font-size: 14px; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; min-height: 100vh; }
  .container { max-width: 1200px; margin: 0 auto; padding: 1rem; }
  h1 { font-size: 1.75rem; font-weight: 700; color: #f1f5f9; text-align: center; padding: 1.5rem 0 0.5rem; }
  h1 span { color: var(--accent); }
  .subtitle { text-align: center; color: var(--text-muted); font-size: 0.9rem; margin-bottom: 1.5rem; }

  /* Cards */
  .card { background: var(--card); border: 1px solid var(--card-border); border-radius: 12px; padding: 1.25rem; margin-bottom: 1rem; }
  .card-title { font-size: 1rem; font-weight: 600; color: #f1f5f9; margin-bottom: 0.75rem; display: flex; align-items: center; gap: 0.5rem; }
  .card-title svg { width: 18px; height: 18px; }

  /* Collapsible */
  .collapsible-header { display: flex; align-items: center; justify-content: space-between; cursor: pointer; user-select: none; padding: 0.5rem 0; }
  .collapsible-header:hover { opacity: 0.9; }
  .collapsible-icon { transition: transform 0.3s; color: var(--text-muted); }
  .collapsible-icon.open { transform: rotate(180deg); }
  .collapsible-body { overflow: hidden; transition: max-height 0.4s ease, opacity 0.3s; max-height: 0; opacity: 0; }
  .collapsible-body.open { max-height: 2000px; opacity: 1; }

  /* Form */
  .form-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 0.75rem; margin-bottom: 0.75rem; }
  .form-group { display: flex; flex-direction: column; gap: 0.25rem; }
  .form-group label { font-size: 0.8rem; color: var(--text-muted); font-weight: 500; text-transform: uppercase; letter-spacing: 0.05em; }
  .form-group input { background: #1e293b; border: 1px solid #334155; border-radius: 8px; padding: 0.5rem 0.75rem; color: var(--text); font-size: 0.95rem; outline: none; transition: border-color 0.2s; }
  .form-group input:focus { border-color: var(--accent); }
  .form-group input::placeholder { color: var(--text-dim); }

  /* Project list */
  .project-list { max-height: 320px; overflow-y: auto; }
  .project-list::-webkit-scrollbar { width: 6px; }
  .project-list::-webkit-scrollbar-track { background: transparent; }
  .project-list::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
  .project-row { display: grid; grid-template-columns: 32px 1fr 1fr 36px; gap: 0.5rem; align-items: center; margin-bottom: 0.4rem; }
  .project-row .idx { font-size: 0.75rem; color: var(--text-dim); text-align: center; font-weight: 600; }
  .project-row input { background: #1e293b; border: 1px solid #334155; border-radius: 6px; padding: 0.4rem 0.6rem; color: var(--text); font-size: 0.85rem; outline: none; transition: border-color 0.2s; }
  .project-row input:focus { border-color: var(--accent); }
  .btn-remove { background: none; border: 1px solid #334155; border-radius: 6px; color: var(--danger); cursor: pointer; font-size: 1.1rem; line-height: 1; padding: 0.2rem 0; transition: all 0.2s; display: flex; align-items: center; justify-content: center; }
  .btn-remove:hover { background: #7f1d1d33; border-color: var(--danger); }

  /* Buttons */
  .btn-primary { background: linear-gradient(135deg, #0891b2, #06b6d4); border: none; border-radius: 10px; padding: 0.75rem 2rem; color: #fff; font-size: 1rem; font-weight: 600; cursor: pointer; transition: all 0.2s; display: inline-flex; align-items: center; gap: 0.5rem; }
  .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 4px 20px #06b6d466; }
  .btn-primary:active { transform: translateY(0); }
  .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; transform: none; box-shadow: none; }
  .btn-secondary { background: #1e293b; border: 1px solid #334155; border-radius: 8px; padding: 0.5rem 1rem; color: var(--accent2); font-size: 0.85rem; font-weight: 500; cursor: pointer; transition: all 0.2s; }
  .btn-secondary:hover { background: #334155; border-color: var(--accent2); }

  /* Tabs */
  .tab-bar { display: flex; gap: 0; margin-bottom: 1rem; background: #0f172a; border-radius: 10px; padding: 4px; border: 1px solid var(--card-border); }
  .tab-btn { flex: 1; background: none; border: none; padding: 0.6rem 1rem; color: var(--text-muted); font-size: 0.9rem; font-weight: 500; cursor: pointer; border-radius: 8px; transition: all 0.2s; }
  .tab-btn.active { background: linear-gradient(135deg, #0891b2, #06b6d4); color: #fff; }
  .tab-btn:hover:not(.active) { color: var(--text); background: #1e293b; }
  .tab-content { display: none; }
  .tab-content.active { display: block; }

  /* KPI Cards */
  .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 0.75rem; margin-bottom: 1rem; }
  .kpi { background: linear-gradient(145deg, #0f172a, #1e293b); border: 1px solid var(--card-border); border-radius: 10px; padding: 1rem; text-align: center; }
  .kpi .value { font-size: 1.5rem; font-weight: 700; color: var(--accent); }
  .kpi .value.amber { color: var(--accent2); }
  .kpi .value.green { color: var(--success); }
  .kpi .label { font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; margin-top: 0.25rem; }

  /* Tables */
  .data-table { width: 100%; border-collapse: separate; border-spacing: 0; font-size: 0.85rem; }
  .data-table thead th { background: #1e293b; color: var(--text-muted); text-transform: uppercase; font-size: 0.7rem; letter-spacing: 0.06em; padding: 0.6rem 0.75rem; text-align: left; border-bottom: 1px solid var(--card-border); }
  .data-table thead th:first-child { border-radius: 8px 0 0 0; }
  .data-table thead th:last-child { border-radius: 0 8px 0 0; }
  .data-table tbody td { padding: 0.5rem 0.75rem; border-bottom: 1px solid #1e293b; }
  .data-table tbody tr:hover { background: #1e293b44; }
  .data-table .overage-pos { color: var(--accent2); }
  .data-table .project-color { width: 10px; height: 10px; border-radius: 3px; display: inline-block; margin-right: 6px; vertical-align: middle; }

  /* SVG */
  .svg-container { overflow-x: auto; margin-bottom: 1rem; border-radius: 8px; background: #0a0f1a; border: 1px solid var(--card-border); }
  .svg-container svg { display: block; }

  /* Banner */
  .info-banner { background: linear-gradient(135deg, #1e293b, #0f172a); border: 1px solid var(--accent2); border-radius: 10px; padding: 1rem 1.25rem; margin-bottom: 1rem; display: flex; align-items: flex-start; gap: 0.75rem; }
  .info-banner .icon { color: var(--accent2); font-size: 1.25rem; flex-shrink: 0; margin-top: 2px; }
  .info-banner .text { font-size: 0.85rem; color: var(--text-muted); line-height: 1.5; }
  .info-banner .text strong { color: var(--accent2); }

  /* Chart */
  .chart-container { position: relative; }
  .chart-legend { display: flex; gap: 1.5rem; justify-content: center; margin-top: 0.75rem; flex-wrap: wrap; }
  .chart-legend-item { display: flex; align-items: center; gap: 0.4rem; font-size: 0.8rem; color: var(--text-muted); }
  .chart-legend-dot { width: 10px; height: 10px; border-radius: 3px; }

  /* Loading */
  .loading-overlay { display: none; position: fixed; inset: 0; background: #020617cc; z-index: 1000; align-items: center; justify-content: center; flex-direction: column; gap: 1rem; }
  .loading-overlay.active { display: flex; }
  .spinner { width: 48px; height: 48px; border: 4px solid #334155; border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { color: var(--text-muted); font-size: 0.95rem; }

  /* No result */
  .no-result { text-align: center; padding: 3rem 1rem; color: var(--text-dim); }
  .no-result svg { width: 48px; height: 48px; margin: 0 auto 1rem; color: #334155; }

  /* Responsive */
  @media (max-width: 768px) {
    .form-row { grid-template-columns: 1fr 1fr; }
    .kpi-grid { grid-template-columns: 1fr 1fr; }
    h1 { font-size: 1.35rem; }
  }
  @media (max-width: 480px) {
    .form-row { grid-template-columns: 1fr; }
  }

  /* Plate section */
  .plate-section { margin-bottom: 1.5rem; }
  .plate-label { font-size: 0.95rem; font-weight: 600; color: var(--accent); margin-bottom: 0.75rem; display: flex; align-items: center; gap: 0.5rem; }
  .plate-label::before { content: ''; width: 4px; height: 18px; background: var(--accent); border-radius: 2px; }

  /* Capacity grid */
  .capacity-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 0.5rem; }
  .capacity-item { display: flex; justify-content: space-between; padding: 0.4rem 0; border-bottom: 1px solid #1e293b; }
  .capacity-item .ck { color: var(--text-muted); font-size: 0.8rem; }
  .capacity-item .cv { color: var(--text); font-weight: 600; font-size: 0.85rem; }

  /* Sheet capacity visual */
  .capacity-visual { display: flex; align-items: center; gap: 1rem; margin-top: 0.75rem; }
  .capacity-box { border: 2px solid var(--accent); border-radius: 4px; position: relative; display: grid; gap: 1px; padding: 1px; background: #334155; }
  .capacity-cell { background: #1e293b; border: 1px dashed #475569; border-radius: 2px; min-width: 12px; min-height: 12px; }
</style>
</head>
<body>

<div class="loading-overlay" id="loadingOverlay">
  <div class="spinner"></div>
  <div class="loading-text">Calculating optimal gang run layout...</div>
</div>

<div class="container">
  <h1>Gang Run <span>Calculator</span></h1>
  <p class="subtitle">Optimize multi-project sticker layouts for gang run printing</p>

  <!-- Input Section -->
  <div class="card">
    <div class="collapsible-header" onclick="toggleCollapsible()">
      <div class="card-title" style="margin:0">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4m6 6v10m6-2a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4"/></svg>
        Configuration
      </div>
      <svg class="collapsible-icon open" id="collapseIcon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg>
    </div>
    <div class="collapsible-body open" id="collapseBody">
      <div style="margin-top: 0.75rem;">
        <div class="form-row">
          <div class="form-group">
            <label>Sheet Width (in)</label>
            <input type="number" id="sheetW" value="24" step="0.1" min="1">
          </div>
          <div class="form-group">
            <label>Sheet Height (in)</label>
            <input type="number" id="sheetH" value="16.5" step="0.1" min="1">
          </div>
          <div class="form-group">
            <label>Sticker Width (in)</label>
            <input type="number" id="stickerW" value="3.5" step="0.01" min="0.1">
          </div>
          <div class="form-group">
            <label>Sticker Height (in)</label>
            <input type="number" id="stickerH" value="4.5" step="0.01" min="0.1">
          </div>
          <div class="form-group">
            <label>Bleed (mm/side)</label>
            <input type="number" id="bleedMm" value="5" step="0.5" min="0">
          </div>
        </div>

        <div style="display:flex; align-items:center; justify-content:space-between; margin: 1rem 0 0.5rem;">
          <span style="font-size:0.85rem; color:var(--text-muted); font-weight:600; text-transform:uppercase; letter-spacing:0.05em;">Projects</span>
          <button class="btn-secondary" onclick="addProject()">+ Add Project</button>
        </div>

        <div class="project-list" id="projectList"></div>

        <div style="text-align:center; margin-top:1.25rem;">
          <button class="btn-primary" id="calcBtn" onclick="runCalculation()">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 3H5a2 2 0 00-2 2v4m6-6h10a2 2 0 012 2v4M9 3v18m0 0h10a2 2 0 002-2V9M9 21H5a2 2 0 01-2-2V9m0 0h18"/></svg>
            Calculate Gang Run
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Results -->
  <div id="resultsArea" style="display:none;">
    <!-- Capacity Card -->
    <div class="card" id="capacityCard"></div>

    <!-- Tabs -->
    <div class="tab-bar" id="tabBar">
      <button class="tab-btn active" onclick="switchTab('single')">Single Plate</button>
      <button class="tab-btn" onclick="switchTab('two')">Two Plate</button>
    </div>

    <!-- Single Plate Tab -->
    <div class="tab-content active" id="tabSingle"></div>

    <!-- Two Plate Tab -->
    <div class="tab-content" id="tabTwo"></div>

    <!-- Combined Chart -->
    <div class="card" id="chartCard" style="display:none;">
      <div class="card-title">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3v18h18"/><path d="M7 16l4-8 4 4 4-10"/></svg>
        Order vs Produced
      </div>
      <div class="chart-container" id="chartContainer"></div>
    </div>
  </div>
</div>

<script>
// ── Project Colors ──
const PROJECT_COLORS = ['#06b6d4','#ec4899','#ef4444','#8b5cf6','#f59e0b','#10b981','#3b82f6','#f97316','#14b8a6','#a855f7'];

// ── Calculator Logic (ported from TypeScript) ──

function getGroupShapes(outs) {
  const shapes = [];
  for (let w = 1; w <= outs; w++) {
    if (outs % w === 0) shapes.push({ w, h: outs / w });
  }
  shapes.sort((a, b) => {
    const ratioA = Math.max(a.w, a.h) / Math.min(a.w, a.h);
    const ratioB = Math.max(b.w, b.h) / Math.min(b.w, b.h);
    if (ratioA !== ratioB) return ratioA - ratioB;
    return b.w - a.w;
  });
  return shapes;
}

function groupDimensions(shape, stickerW, stickerH, bleedIn) {
  return { width: shape.w * stickerW + 2 * bleedIn, height: shape.h * stickerH + 2 * bleedIn };
}

function calculateCapacity(sheetW, sheetH, stickerW, stickerH, bleedMm) {
  const bleedIn = bleedMm / 25.4;
  const cellW = stickerW + 2 * bleedIn;
  const cellH = stickerH + 2 * bleedIn;
  const cols = Math.floor(sheetW / cellW);
  const rows = Math.floor(sheetH / cellH);
  return { cols, rows, maxPerSheet: cols * rows, cellWidth: cellW, cellHeight: cellH, stickerWidth: stickerW, stickerHeight: stickerH, bleedInches: bleedIn, sheetWidth: sheetW, sheetHeight: sheetH };
}

function shelfPack(groups, sheetW, sheetH) {
  const placed = [];
  let shelfY = 0, shelfHeight = 0, cursorX = 0;
  for (const g of groups) {
    if (cursorX + g.width <= sheetW) {
      placed.push({ ...g, x: cursorX, y: shelfY });
      cursorX += g.width;
      shelfHeight = Math.max(shelfHeight, g.height);
    } else {
      shelfY += shelfHeight;
      shelfHeight = 0;
      cursorX = 0;
      if (g.width > sheetW || shelfY + g.height > sheetH) return null;
      placed.push({ ...g, x: cursorX, y: shelfY });
      cursorX += g.width;
      shelfHeight = Math.max(shelfHeight, g.height);
    }
  }
  if (shelfY + shelfHeight > sheetH) return null;
  return placed;
}

function tryPackGroups(groups, sheetW, sheetH) {
  const orderings = [
    [...groups].sort((a, b) => b.height - a.height),
    [...groups].sort((a, b) => b.width - a.width),
    [...groups].sort((a, b) => (b.width * b.height) - (a.width * a.height)),
    [...groups].sort((a, b) => a.height - b.height),
    [...groups].sort((a, b) => a.width - b.width),
  ];
  for (const ordered of orderings) {
    const result = shelfPack(ordered, sheetW, sheetH);
    if (result) return result;
  }
  return null;
}

function findValidPacking(allocation, sheetW, sheetH, stickerW, stickerH, bleedIn) {
  const n = allocation.length;
  const allShapes = allocation.map(a => getGroupShapes(a.outs));
  let attempts = 0;
  const maxAttempts = 500;

  function tryCombo(idx, currentShapes) {
    if (idx === n) {
      attempts++;
      if (attempts > maxAttempts) return null;
      const groupsWithDims = currentShapes.map((shape, i) => {
        const dims = groupDimensions(shape, stickerW, stickerH, bleedIn);
        return { name: allocation[i].name, projectIdx: allocation[i].projectIdx, shape, outs: allocation[i].outs, width: dims.width, height: dims.height };
      });
      for (const g of groupsWithDims) {
        if (g.width > sheetW || g.height > sheetH) return null;
      }
      const placed = tryPackGroups(groupsWithDims, sheetW, sheetH);
      if (placed) return { shapes: [...currentShapes], placedGroups: placed };
      return null;
    }
    const shapesToTry = allShapes[idx].slice(0, 4);
    for (const shape of shapesToTry) {
      const dims = groupDimensions(shape, stickerW, stickerH, bleedIn);
      if (dims.width > sheetW || dims.height > sheetH) continue;
      currentShapes.push(shape);
      const result = tryCombo(idx + 1, currentShapes);
      if (result) return result;
      currentShapes.pop();
      if (attempts > maxAttempts) return null;
    }
    return null;
  }
  return tryCombo(0, []);
}

function findBestAllocationWithPacking(demands, sheetW, sheetH, stickerW, stickerH, bleedIn, maxSlots) {
  const n = demands.length;
  if (n === 0) return null;
  const minOuts = 2;
  if (n * minOuts > maxSlots) return null;
  let bestL = Infinity, bestResult = null;
  const current = new Array(n).fill(0);

  function search(idx, remaining) {
    if (idx === n - 1) {
      current[idx] = remaining;
      if (remaining < minOuts) return;
      let L = 0;
      for (let i = 0; i < n; i++) L = Math.max(L, Math.ceil(demands[i] / current[i]));
      if (L >= bestL) return;
      const allocInfo = current.map((outs, i) => ({ name: 'p' + i, projectIdx: i, outs }));
      const packing = findValidPacking(allocInfo, sheetW, sheetH, stickerW, stickerH, bleedIn);
      if (packing) {
        bestL = L;
        bestResult = { allocation: [...current], runLength: L, shapes: packing.shapes, placedGroups: packing.placedGroups };
      }
      return;
    }
    const minRemaining = (n - idx - 1) * minOuts;
    const maxVal = remaining - minRemaining;
    for (let val = minOuts; val <= maxVal; val++) {
      current[idx] = val;
      let partialL = 0;
      for (let i = 0; i <= idx; i++) partialL = Math.max(partialL, Math.ceil(demands[i] / current[i]));
      if (partialL >= bestL) continue;
      search(idx + 1, remaining - val);
    }
  }
  search(0, maxSlots);
  return bestResult;
}

function buildPlateResult(projects, indices, allocation, shapes, runLength, capacity, placedGroups) {
  const totalProduced = allocation.reduce((sum, outs) => sum + outs * runLength, 0);
  let totalOrderQty = 0;
  const allocationEntries = indices.map((projIdx, i) => {
    const qty = projects[projIdx].quantity;
    const outs = allocation[i];
    const produced = outs * runLength;
    const overage = produced - qty;
    const overagePct = qty > 0 ? (overage / qty) * 100 : 0;
    totalOrderQty += qty;
    return { name: projects[projIdx].name, quantity: qty, outs, produced, overage, overagePct, groupShape: shapes[i] };
  });
  const remappedGroups = placedGroups.map(pg => {
    const localIdx = parseInt(pg.name.replace('p', ''));
    return { ...pg, name: projects[indices[localIdx]].name, projectIdx: indices[localIdx] };
  });
  const stickerArea = capacity.stickerWidth * capacity.stickerHeight;
  const sheetArea = capacity.sheetWidth * capacity.sheetHeight;
  const usedStickerArea = totalProduced * stickerArea;
  const totalSheetArea = runLength * sheetArea;
  const materialYield = totalSheetArea > 0 ? (usedStickerArea / totalSheetArea) * 100 : 0;
  return { allocation: allocationEntries, runLength, totalSheets: runLength, totalProduced, totalOverage: totalProduced - totalOrderQty, materialYield, placedGroups: remappedGroups };
}

function findBestTwoPlate(projects, maxSlots, capacity) {
  const n = projects.length;
  if (n < 2) return null;
  const demands = projects.map(p => p.quantity);
  let bestTotal = Infinity, bestResult = null;
  const totalMasks = 1 << n;
  for (let mask = 1; mask < totalMasks - 1; mask++) {
    if (!(mask & 1)) continue;
    const plate1Indices = [], plate2Indices = [];
    for (let i = 0; i < n; i++) {
      if (mask & (1 << i)) plate1Indices.push(i);
      else plate2Indices.push(i);
    }
    if (plate1Indices.length === 0 || plate2Indices.length === 0) continue;
    if (plate1Indices.length * 2 > maxSlots || plate2Indices.length * 2 > maxSlots) continue;
    const p1Demands = plate1Indices.map(i => demands[i]);
    const p1Result = findBestAllocationWithPacking(p1Demands, capacity.sheetWidth, capacity.sheetHeight, capacity.stickerWidth, capacity.stickerHeight, capacity.bleedInches, maxSlots);
    if (!p1Result) continue;
    const p2Demands = plate2Indices.map(i => demands[i]);
    const p2Result = findBestAllocationWithPacking(p2Demands, capacity.sheetWidth, capacity.sheetHeight, capacity.stickerWidth, capacity.stickerHeight, capacity.bleedInches, maxSlots);
    if (!p2Result) continue;
    const totalSheets = p1Result.runLength + p2Result.runLength;
    if (totalSheets >= bestTotal) continue;
    bestTotal = totalSheets;
    const plate1Res = buildPlateResult(projects, plate1Indices, p1Result.allocation, p1Result.shapes, p1Result.runLength, capacity, p1Result.placedGroups);
    const plate2Res = buildPlateResult(projects, plate2Indices, p2Result.allocation, p2Result.shapes, p2Result.runLength, capacity, p2Result.placedGroups);
    const combinedProduced = plate1Res.totalProduced + plate2Res.totalProduced;
    const totalOrderQty = demands.reduce((s, q) => s + q, 0);
    const stickerArea = capacity.stickerWidth * capacity.stickerHeight;
    const sheetArea = capacity.sheetWidth * capacity.sheetHeight;
    const materialYield = (totalSheets * sheetArea) > 0 ? ((combinedProduced * stickerArea) / (totalSheets * sheetArea)) * 100 : 0;
    bestResult = { plate1: plate1Res, plate2: plate2Res, totalSheets, totalProduced: combinedProduced, totalOverage: combinedProduced - totalOrderQty, materialYield, sheetsSaved: 0, plate1ProjectIndices: plate1Indices, plate2ProjectIndices: plate2Indices };
  }
  return bestResult;
}

function fmtDec(n, d) { return n.toLocaleString('en-US', { minimumFractionDigits: d, maximumFractionDigits: d }); }

}

  document.getElementById('loadingOverlay').classList.toggle('active', show);
  document.getElementById('calcBtn').disabled = show;
}

function runCalculation() {
  // Read inputs
  const sheetW = parseFloat(document.getElementById('sheetW').value) || 24;
  const sheetH = parseFloat(document.getElementById('sheetH').value) || 16.5;
  const stickerW = parseFloat(document.getElementById('stickerW').value) || 3.5;
  const stickerH = parseFloat(document.getElementById('stickerH').value) || 4.5;
  const bleedMm = parseFloat(document.getElementById('bleedMm').value) || 5;

  // Sync project values from inputs
  const rows = document.querySelectorAll('.project-row');
  rows.forEach((row, i) => {
    if (projects[i]) {
      const inputs = row.querySelectorAll('input');
      projects[i].name = inputs[0].value;
      projects[i].quantity = parseInt(inputs[1].value) || 0;
    }
  });

  // Collapse input panel
  const body = document.getElementById('collapseBody');
  const icon = document.getElementById('collapseIcon');
  body.classList.remove('open');
  icon.classList.remove('open');

  showLoading(true);

  setTimeout(() => {
    try {
      // Capacity
      lastCapacity = calculateCapacity(sheetW, sheetH, stickerW, stickerH, bleedMm);

      // Single plate
      const demands = projects.map(p => p.quantity);
      const singleResult = findBestAllocationWithPacking(demands, sheetW, sheetH, stickerW, stickerH, lastCapacity.bleedInches, lastCapacity.maxPerSheet);
      if (singleResult) {
        const indices = projects.map((_, i) => i);
        lastSingleResult = buildPlateResult(projects, indices, singleResult.allocation, singleResult.shapes, singleResult.runLength, lastCapacity, singleResult.placedGroups);
      } else {
        lastSingleResult = null;
      }

      // Two plate
      lastTwoResult = findBestTwoPlate(projects, lastCapacity.maxPerSheet, lastCapacity);
      if (lastTwoResult && lastSingleResult) {
        lastTwoResult.sheetsSaved = lastSingleResult.totalSheets - lastTwoResult.totalSheets;
      }

      renderResults();
    } catch (e) {
      console.error('Calculation error:', e);
    }
    showLoading(false);
  }, 50);
}

function renderSVG(placedGroups, allocation, capacity) {
  const sw = capacity.sheetWidth;
  const sh = capacity.sheetHeight;
  const bleedIn = capacity.bleedInches;
  const stickerW = capacity.stickerWidth;
  const stickerH = capacity.stickerHeight;
  const pad = 1.2; // inch padding for annotations
  const svgW = sw + 2 * pad;
  const svgH = sh + 2 * pad + 0.8;
  const ox = pad;
  const oy = pad;

  // Hatch pattern id unique per call
  const uid = 'h' + Math.random().toString(36).slice(2, 8);

  let svg = `<div class="svg-container"><svg width="${svgW * 20}" height="${svgH * 20}" viewBox="0 0 ${svgW} ${svgH}" xmlns="http://www.w3.org/2000/svg" style="max-width:100%;height:auto;">`;

  // Defs
  svg += `<defs>`;
  svg += `<pattern id="${uid}" width="0.15" height="0.15" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">`;
  svg += `<line x1="0" y1="0" x2="0" y2="0.15" stroke="#f59e0b" stroke-width="0.04" opacity="0.5"/>`;
  svg += `</pattern>`;
  svg += `</defs>`;

  // Sheet background
  svg += `<rect x="${ox}" y="${oy}" width="${sw}" height="${sh}" fill="#0c1220" stroke="#334155" stroke-width="0.06" rx="0.1"/>`;

  // Registration marks
  const rmLen = 0.4;
  const rmOff = 0.2;
  const rmStyle = `stroke="#94a3b8" stroke-width="0.03"`;
  // Top-left
  svg += `<line x1="${ox-rmOff}" y1="${oy}" x2="${ox-rmOff-rmLen}" y2="${oy}" ${rmStyle}/>`;
  svg += `<line x1="${ox}" y1="${oy-rmOff}" x2="${ox}" y2="${oy-rmOff-rmLen}" ${rmStyle}/>`;
  // Top-right
  svg += `<line x1="${ox+sw+rmOff}" y1="${oy}" x2="${ox+sw+rmOff+rmLen}" y2="${oy}" ${rmStyle}/>`;
  svg += `<line x1="${ox+sw}" y1="${oy-rmOff}" x2="${ox+sw}" y2="${oy-rmOff-rmLen}" ${rmStyle}/>`;
  // Bottom-left
  svg += `<line x1="${ox-rmOff}" y1="${oy+sh}" x2="${ox-rmOff-rmLen}" y2="${oy+sh}" ${rmStyle}/>`;
  svg += `<line x1="${ox}" y1="${oy+sh+rmOff}" x2="${ox}" y2="${oy+sh+rmOff+rmLen}" ${rmStyle}/>`;
  // Bottom-right
  svg += `<line x1="${ox+sw+rmOff}" y1="${oy+sh}" x2="${ox+sw+rmOff+rmLen}" y2="${oy+sh}" ${rmStyle}/>`;
  svg += `<line x1="${ox+sw}" y1="${oy+sh+rmOff}" x2="${ox+sw}" y2="${oy+sh+rmOff+rmLen}" ${rmStyle}/>`;
  // Cross circles
  const rc = 0.15;
  [[ox, oy], [ox+sw, oy], [ox, oy+sh], [ox+sw, oy+sh]].forEach(([cx, cy]) => {
    svg += `<circle cx="${cx}" cy="${cy}" r="${rc}" fill="none" stroke="#94a3b8" stroke-width="0.025"/>`;
  });

  // Groups
  placedGroups.forEach((pg, idx) => {
    const color = PROJECT_COLORS[pg.projectIdx % PROJECT_COLORS.length];
    const gx = ox + pg.x;
    const gy = oy + pg.y;
    const gw = pg.width;
    const gh = pg.height;
    const shape = pg.shape;

    // Group fill
    svg += `<rect x="${gx}" y="${gy}" width="${gw}" height="${gh}" fill="${color}" fill-opacity="0.12" stroke="${color}" stroke-width="0.05" rx="0.05"/>`;

    // Bleed zone (hatched) — full border
    svg += `<rect x="${gx}" y="${gy}" width="${gw}" height="${gh}" fill="url(#${uid})" rx="0.05"/>`;
    // Inner area (clear the hatching inside sticker area)
    const innerX = gx + bleedIn;
    const innerY = gy + bleedIn;
    const innerW = gw - 2 * bleedIn;
    const innerH = gh - 2 * bleedIn;
    svg += `<rect x="${innerX}" y="${innerY}" width="${innerW}" height="${innerH}" fill="#0c1220" rx="0.02"/>`;

    // Individual sticker cells with dashed die-cut lines
    for (let r = 0; r < shape.h; r++) {
      for (let c = 0; c < shape.w; c++) {
        const cellX = innerX + c * stickerW;
        const cellY = innerY + r * stickerH;
        // Sticker cell background
        svg += `<rect x="${cellX}" y="${cellY}" width="${stickerW}" height="${stickerH}" fill="${color}" fill-opacity="0.06" stroke="${color}" stroke-width="0.025" stroke-dasharray="0.12,0.08" rx="0.02"/>`;
      }
    }

    // Label in center
    const centerX = gx + gw / 2;
    const centerY = gy + gh / 2;
    const fontSize = Math.min(gw, gh) * 0.12;
    const labelSize = Math.max(fontSize, 0.3);
    svg += `<text x="${centerX}" y="${centerY - labelSize * 0.3}" text-anchor="middle" dominant-baseline="middle" fill="${color}" font-size="${labelSize}" font-weight="700" font-family="system-ui,sans-serif">${pg.name}</text>`;
    svg += `<text x="${centerX}" y="${centerY + labelSize * 0.9}" text-anchor="middle" dominant-baseline="middle" fill="#94a3b8" font-size="${labelSize * 0.7}" font-family="system-ui,sans-serif">${pg.outs}x</text>`;

    // Dimension annotations
    const dimOff = 0.35;
    const dimStyle = `stroke="#64748b" stroke-width="0.025"`;
    const textStyle = `fill="#64748b" font-size="0.22" font-family="system-ui,sans-serif"`;
    // Top dimension (width)
    svg += `<line x1="${gx}" y1="${gy - dimOff}" x2="${gx + gw}" y2="${gy - dimOff}" ${dimStyle}/>`;
    svg += `<line x1="${gx}" y1="${gy - dimOff + 0.08}" x2="${gx}" y2="${gy - dimOff - 0.08}" ${dimStyle}/>`;
    svg += `<line x1="${gx + gw}" y1="${gy - dimOff + 0.08}" x2="${gx + gw}" y2="${gy - dimOff - 0.08}" ${dimStyle}/>`;
    svg += `<text x="${gx + gw / 2}" y="${gy - dimOff - 0.08}" text-anchor="middle" ${textStyle}>${fmtDec(gw, 2)}"</text>`;
    // Right dimension (height)
    svg += `<line x1="${gx + gw + dimOff}" y1="${gy}" x2="${gx + gw + dimOff}" y2="${gy + gh}" ${dimStyle}/>`;
    svg += `<line x1="${gx + gw + dimOff - 0.08}" y1="${gy}" x2="${gx + gw + dimOff + 0.08}" y2="${gy}" ${dimStyle}/>`;
    svg += `<line x1="${gx + gw + dimOff - 0.08}" y1="${gy + gh}" x2="${gx + gw + dimOff + 0.08}" y2="${gy + gh}" ${dimStyle}/>`;
    svg += `<text x="${gx + gw + dimOff + 0.12}" y="${gy + gh / 2}" text-anchor="start" dominant-baseline="middle" ${textStyle} transform="rotate(90,${gx + gw + dimOff + 0.12},${gy + gh / 2})">${fmtDec(gh, 2)}"</text>`;
  });

  // Sheet dimension lines
  const sdOff = 0.7;
  const sdStyle = `stroke="#475569" stroke-width="0.035"`;
  const stStyle = `fill="#94a3b8" font-size="0.28" font-weight="600" font-family="system-ui,sans-serif"`;
  // Top
  svg += `<line x1="${ox}" y1="${oy - sdOff}" x2="${ox + sw}" y2="${oy - sdOff}" ${sdStyle}/>`;
  svg += `<line x1="${ox}" y1="${oy - sdOff + 0.1}" x2="${ox}" y2="${oy - sdOff - 0.1}" ${sdStyle}/>`;
  svg += `<line x1="${ox + sw}" y1="${oy - sdOff + 0.1}" x2="${ox + sw}" y2="${oy - sdOff - 0.1}" ${sdStyle}/>`;
  svg += `<text x="${ox + sw / 2}" y="${oy - sdOff - 0.12}" text-anchor="middle" ${stStyle}>${fmtDec(sw, 1)}"</text>`;
  // Left
  svg += `<line x1="${ox - sdOff}" y1="${oy}" x2="${ox - sdOff}" y2="${oy + sh}" ${sdStyle}/>`;
  svg += `<line x1="${ox - sdOff + 0.1}" y1="${oy}" x2="${ox - sdOff - 0.1}" y2="${oy}" ${sdStyle}/>`;
  svg += `<line x1="${ox - sdOff + 0.1}" y1="${oy + sh}" x2="${ox - sdOff - 0.1}" y2="${oy + sh}" ${sdStyle}/>`;
  svg += `<text x="0" y="0" text-anchor="middle" ${stStyle} transform="rotate(-90,${ox - sdOff - 0.12},${oy + sh / 2})" transform-origin="${ox - sdOff - 0.12} ${oy + sh / 2}"><tspan x="${ox - sdOff - 0.12}" y="${oy + sh / 2}">${fmtDec(sh, 1)}"</tspan></text>`;

  // Grain direction arrow
  const arrowY = oy + sh + 0.6;
  const arrowX = ox + sw * 0.3;
  const arrowLen = sw * 0.4;
  svg += `<line x1="${arrowX}" y1="${arrowY}" x2="${arrowX + arrowLen}" y2="${arrowY}" stroke="#64748b" stroke-width="0.04"/>`;
  svg += `<polygon points="${arrowX + arrowLen},${arrowY} ${arrowX + arrowLen - 0.25},${arrowY - 0.12} ${arrowX + arrowLen - 0.25},${arrowY + 0.12}" fill="#64748b"/>`;
  svg += `<text x="${arrowX + arrowLen / 2}" y="${arrowY + 0.25}" text-anchor="middle" fill="#64748b" font-size="0.2" font-family="system-ui,sans-serif">Grain Direction</text>`;

  // Legend
  const lx = ox + sw - 3.5;
  const ly = oy + sh + 0.5;
  svg += `<rect x="${lx}" y="${ly}" width="0.25" height="0.18" fill="url(#${uid})" stroke="#f59e0b" stroke-width="0.02"/>`;
  svg += `<text x="${lx + 0.35}" y="${ly + 0.14}" fill="#94a3b8" font-size="0.18" font-family="system-ui,sans-serif">Bleed Zone</text>`;
  svg += `<line x1="${lx + 1.3}" y1="${ly + 0.09}" x2="${lx + 1.7}" y2="${ly + 0.09}" stroke="#06b6d4" stroke-width="0.03" stroke-dasharray="0.1,0.06"/>`;
  svg += `<text x="${lx + 1.8}" y="${ly + 0.14}" fill="#94a3b8" font-size="0.18" font-family="system-ui,sans-serif">Die-cut Line</text>`;
  svg += `<rect x="${lx + 2.7}" y="${ly}" width="0.25" height="0.18" fill="none" stroke="#06b6d4" stroke-width="0.035" rx="0.02"/>`;
  svg += `<text x="${lx + 3.05}" y="${ly + 0.14}" fill="#94a3b8" font-size="0.18" font-family="system-ui,sans-serif">Group Boundary</text>`;

  svg += `</svg></div>`;
  return svg;
}

function renderChart() {
  const chartCard = document.getElementById('chartCard');
  const container = document.getElementById('chartContainer');

  // Gather data from whichever results are available
  let data = [];
  if (lastTwoResult) {
    data = projects.map((p, i) => {
      let produced = 0;
      const p1a = lastTwoResult.plate1.allocation.find(a => a.projectIdx === i);
      const p2a = lastTwoResult.plate2.allocation.find(a => a.projectIdx === i);
      if (p1a) produced += p1a.produced;
      if (p2a) produced += p2a.produced;
      return { name: p.name, ordered: p.quantity, produced, color: PROJECT_COLORS[i % PROJECT_COLORS.length] };
    });
  } else if (lastSingleResult) {
    data = lastSingleResult.allocation.map((a, i) => ({
      name: a.name, ordered: a.quantity, produced: a.produced, color: PROJECT_COLORS[a.projectIdx % PROJECT_COLORS.length]
    }));
  }

  if (data.length === 0) {
    chartCard.style.display = 'none';
    return;
  }

  chartCard.style.display = 'block';
  const maxVal = Math.max(...data.map(d => Math.max(d.ordered, d.produced)));
  const barWidth = 28;
  const gap = 12;
  const chartWidth = data.length * (barWidth * 2 + gap) + gap + 60;
  const chartHeight = 280;
  const plotLeft = 55;
  const plotBottom = chartHeight - 30;
  const plotTop = 10;
  const plotHeight = plotBottom - plotTop;
  const plotWidth = chartWidth - plotLeft - 20;

  // Scale
  const niceMax = Math.ceil(maxVal / 1000) * 1000;
  const scale = plotHeight / niceMax;

  // Y-axis ticks
  const tickCount = 5;
  let yAxis = '';
  for (let i = 0; i <= tickCount; i++) {
    const val = (niceMax / tickCount) * i;
    const y = plotBottom - val * scale;
    yAxis += `<line x1="${plotLeft}" y1="${y}" x2="${chartWidth - 20}" y2="${y}" stroke="#1e293b" stroke-width="1"/>`;
    yAxis += `<text x="${plotLeft - 8}" y="${y + 4}" text-anchor="end" fill="#64748b" font-size="11" font-family="system-ui,sans-serif">${fmt(val)}</text>`;
  }

  // Bars
  let bars = '';
  const groupWidth = barWidth * 2 + gap;
  const totalGroupsWidth = data.length * groupWidth;
  const barAreaWidth = plotWidth - 10;
  const barScale = barAreaWidth / totalGroupsWidth;

  data.forEach((d, i) => {
    const groupX = plotLeft + 10 + i * groupWidth * barScale;
    const orderedH = d.ordered * scale * barScale / barScale;
    const producedH = d.produced * scale * barScale / barScale;

    const oH = (d.ordered / niceMax) * plotHeight;
    const pH = (d.produced / niceMax) * plotHeight;
    const bw = barWidth * barScale * 0.9;

    // Order bar
    bars += `<rect x="${groupX}" y="${plotBottom - oH}" width="${bw}" height="${oH}" fill="#334155" rx="3"/>`;
    // Produced bar
    bars += `<rect x="${groupX + bw + 2}" y="${plotBottom - pH}" width="${bw}" height="${pH}" fill="${d.color}" rx="3" opacity="0.85"/>`;
    // Label
    bars += `<text x="${groupX + bw + 1}" y="${plotBottom + 16}" text-anchor="middle" fill="#94a3b8" font-size="11" font-weight="600" font-family="system-ui,sans-serif">${d.name}</text>`;
  });

  container.innerHTML = `
    <svg width="${chartWidth}" height="${chartHeight}" viewBox="0 0 ${chartWidth} ${chartHeight}" style="max-width:100%;overflow:visible;">
      ${yAxis}
      ${bars}
    </svg>
    <div class="chart-legend">
      <div class="chart-legend-item"><div class="chart-legend-dot" style="background:#334155"></div>Order Qty</div>
      <div class="chart-legend-item"><div class="chart-legend-dot" style="background:var(--accent)"></div>Produced</div>
    </div>
  `;
}

// ── Init ──
renderProjects();
</script>
