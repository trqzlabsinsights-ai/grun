services:
  - type: web
    name: grun
    runtime: node
    buildCommand: bash build.sh
    startCommand: node .next/standalone/server.js
    envVars:
      - key: HOSTNAME
        value: 0.0.0.0
      - key: NODE_VERSION
        value: "20"
      - key: DATABASE_URL
        value: "file:/tmp/grun.db"
    plan: free
